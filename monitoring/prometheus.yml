# monitoring/prometheus.yml 
# Configuration de Prometheus quoi surveiller et à quelle fréquence 
global:
  scrape_interval: 15s        # collecter les métriques toutes les 15s
  evaluation_interval: 15s    # évaluer les alertes toutes les 15s

scrape_configs:

  # Prometheus se surveille lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques système (CPU, RAM, disque)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Backend NestJS
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/metrics'

  # Base de données PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # OCR Service
  - job_name: 'ocr-service' 
    static_configs:
      - targets: ['ocr-service:8001']
    metrics_path: '/metrics'