# docker-compose.yml
services:
  postgres:
    image: postgres:15-alpine
    container_name: atb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atb_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atb_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: ${PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      OCR_SERVICE_URL: http://ocr-service:8001
      RESEND_API_KEY: ${RESEND_API_KEY}
      FIXED_RECEIVER_EMAIL: ${FIXED_RECEIVER_EMAIL}
      EHOUWIYA_JWT_SECRET: ${JWT_SECRET_EHOUWIYA}
      ADMIN_JWT_SECRET: ${JWT_SECRET_ADMIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atb_network

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: atb_frontend_admin
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - atb_network

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: atb_ocr
    restart: unless-stopped
    ports:
      - '8005:8001'
    networks:
      - atb_network

  # ═══════════════════════════════════════
  #   MONITORING — Prometheus
  # ═══════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: atb_prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - atb_network

  # ═══════════════════════════════════════
  #   MONITORING — Grafana
  # ═══════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: atb_grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-atbdigipack}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - atb_network

  # ═══════════════════════════════════════
  #   MONITORING — Node Exporter (CPU/RAM)
  # ═══════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:latest
    container_name: atb_node_exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    networks:
      - atb_network

  # ═══════════════════════════════════════
  #   MONITORING — Postgres Exporter
  # ═══════════════════════════════════════
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: atb_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atb_network

# ═══════════════════════════════════════
  #   LOGGING — Loki (stockage des logs)
  # ═══════════════════════════════════════
  loki:
    image: grafana/loki:latest
    container_name: atb_loki
    restart: unless-stopped
    user: "0"
    ports:
      - '3100:3100'
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - atb_network

  # ═══════════════════════════════════════
  #   LOGGING — Promtail (collecteur logs)
  # ═══════════════════════════════════════
  promtail:
    image: grafana/promtail:latest
    container_name: atb_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - atb_network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
networks:
  atb_network:
    driver: bridge
