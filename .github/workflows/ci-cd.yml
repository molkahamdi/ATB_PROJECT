name: CI/CD — Deploy Docker Compose

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & Test Backend
        working-directory: ./backend
        run: |
          npm ci
          npm run test --if-present
          npm run build

      - name: Install & Build Admin
        working-directory: ./frontend-admin
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 57.129.112.6 >> ~/.ssh/known_hosts

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@57.129.112.6 "echo SSH_OK"

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@57.129.112.6 bash << 'ENDSSH'
          cd /opt/atb-digipack
          git pull origin main
          echo 'VITE_API_URL=http://57.129.112.6:3000' > frontend-admin/.env.production
          docker compose down
          docker compose up -d --build
          docker system prune -f
          docker compose ps
          ENDSSH