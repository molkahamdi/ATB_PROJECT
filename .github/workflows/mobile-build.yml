name: Mobile Build — APK Debug

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create .env file
        working-directory: ./frontend
        run: echo "EXPO_PUBLIC_API_URL=http://57.129.112.6:3000" > .env

      - name: Create valid assets
        working-directory: ./frontend
        run: |
          mkdir -p assets
          curl -s -o assets/icon.png https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/icon.png
          curl -s -o assets/adaptive-icon.png https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/adaptive-icon.png
          curl -s -o assets/splash.png https://raw.githubusercontent.com/expo/expo/master/templates/expo-template-blank/assets/splash.png

      - name: Prebuild for Android
        working-directory: ./frontend
        run: npx expo prebuild --platform android --clean

      - name: Remove conflicting gradle.properties
        working-directory: ./frontend/android
        run: |
          rm -f gradle.properties
          rm -f app/gradle.properties 2>/dev/null || true

      - name: Make gradlew executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build APK Debug
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATB-DigiPack-Debug
          path: ./frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30