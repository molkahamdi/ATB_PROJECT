name: Mobile Build — APK Release

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create .env file
        working-directory: ./frontend
        run: echo "EXPO_PUBLIC_API_URL=http://57.129.112.6:3000" > .env

      - name: Force production API URL in config.ts
        working-directory: ./frontend/src
        run: |
          cat > config.ts << 'EOF'
          const DEV_URL  = 'http://192.168.100.6:3000';
          const PROD_URL = 'http://57.129.112.6:3000';
          export const API_URL = PROD_URL;
          console.log(`[CONFIG] API_URL = ${API_URL}`);
          EOF
          echo "✅ config.ts mis à jour"

      - name: Create assets
        working-directory: ./frontend
        run: |
          mkdir -p assets
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/splash-icon.png
          cp assets/icon.png assets/splash.png
          cp assets/icon.png assets/favicon.png
          if [ -f src/assets/atb.png ]; then
            cp src/assets/atb.png assets/icon.png
            cp src/assets/atb.png assets/adaptive-icon.png
            cp src/assets/atb.png assets/splash-icon.png
            cp src/assets/atb.png assets/splash.png
            cp src/assets/atb.png assets/favicon.png
            echo "✅ Logo ATB utilisé"
          fi
          echo "Assets créés:"
          ls -la assets/

      - name: Fix corrupted PNG assets
        working-directory: ./frontend
        run: |
          pip install Pillow -q
          find . -not -path "*/node_modules/*" -name "*.png" | while read f; do
            if ! python3 -c "from PIL import Image; Image.open('$f').verify()" 2>/dev/null; then
              echo "Fixing: $f"
              convert "$f" /tmp/fixed.png 2>/dev/null && cp /tmp/fixed.png "$f" || true
            fi
          done

      - name: Prebuild Android
        working-directory: ./frontend
        run: npx expo prebuild --platform android --clean --no-install

      - name: Fix PNG after prebuild
        working-directory: ./frontend
        run: |
          find android -name "*.png" 2>/dev/null | while read f; do
            convert "$f" -strip "$f" 2>/dev/null || true
          done

      - name: Make gradlew executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build APK Release
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATB-DigiPack-APK-${{ github.run_number }}
          path: ./frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30