name: Mobile Build — APK Debug

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create .env file
        working-directory: ./frontend
        run: echo "EXPO_PUBLIC_API_URL=http://57.129.112.6:3000" > .env

      - name: Create missing assets folder and icons
        working-directory: ./frontend
        run: |
          mkdir -p assets
          # Create a simple 512x512 PNG icon (transparent) using base64
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/favicon.png
          cp assets/icon.png assets/splash-icon.png

      - name: Prebuild for Android
        working-directory: ./frontend
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build APK Debug
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATB-DigiPack-APK
          path: ./frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30