name: Mobile Build — APK Release

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create .env file
        working-directory: ./frontend
        run: echo "EXPO_PUBLIC_API_URL=http://57.129.112.6:3000" > .env

      - name: Force production API URL in config.ts
        working-directory: ./frontend/src
        run: |
          cat > config.ts << 'EOF'
          // Configuration API - Forcé en production pour l'APK
          const DEV_URL  = 'http://192.168.100.6:3000';
          const PROD_URL = 'http://57.129.112.6:3000';
          
          // Force l'utilisation de l'URL de production
          export const API_URL = PROD_URL;
          
          console.log(`[CONFIG] API_URL = ${API_URL}`);
          export default { API_URL };
          EOF
          echo "✅ config.ts forcé avec URL production:"
          cat config.ts

      - name: Create assets
        working-directory: ./frontend
        run: |
          mkdir -p assets
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/splash-icon.png
          cp assets/icon.png assets/splash.png
          cp assets/icon.png assets/favicon.png
          if [ -f src/assets/atb.png ]; then
            cp src/assets/atb.png assets/icon.png
            cp src/assets/atb.png assets/adaptive-icon.png
            cp src/assets/atb.png assets/splash-icon.png
            cp src/assets/atb.png assets/splash.png
            cp src/assets/atb.png assets/favicon.png
            echo "✅ Logo ATB utilisé"
          fi

      - name: Fix corrupted PNG assets
        working-directory: ./frontend
        run: |
          echo "Recherche et correction des PNG corrompus..."
          find . -not -path "*/node_modules/*" -not -path "*/.git/*" -name "*.png" | while read f; do
            if ! python3 -c "
          from PIL import Image
          import sys
          try:
              img = Image.open('$f')
              img.verify()
          except Exception as e:
              sys.exit(1)
          " 2>/dev/null; then
              echo "PNG corrompu detecte: $f"
              convert "$f" /tmp/fixed_asset.png 2>/dev/null && cp /tmp/fixed_asset.png "$f" && echo "Corrige: $f" || echo "Impossible de corriger: $f"
            fi
          done
          pip install Pillow -q
          find . -not -path "*/node_modules/*" -name "tunisiaflag*" | while read f; do
            echo "Force reconversion tunisiaflag: $f"
            convert "$f" -strip -define png:compression-filter=0 -define png:compression-level=9 /tmp/flag_fixed.png && cp /tmp/flag_fixed.png "$f"
            echo "tunisiaflag corrige!"
          done

      - name: Prebuild Android
        working-directory: ./frontend
        run: npx expo prebuild --platform android --clean --no-install

      - name: Add ProGuard rules for Expo FileSystem
        working-directory: ./frontend/android/app
        run: |
          cat >> proguard-rules.pro << 'EOF'

          # Expo FileSystem
          -keep class expo.modules.filesystem.** { *; }
          -keep class expo.modules.kotlin.** { *; }
          -keep class expo.modules.** { *; }

          # React Native
          -keep class com.facebook.react.** { *; }
          -keep class com.facebook.hermes.** { *; }

          # Expo modules généraux
          -keep @expo.modules.core.interfaces.Package class * { *; }
          -keepclassmembers class * {
              @expo.modules.core.ExportedFunction *;
          }
          EOF
          echo "✅ ProGuard rules added for Expo FileSystem"

      - name: Disable minification for Release build
        working-directory: ./frontend/android/app
        run: |
          # Désactiver ProGuard (minification) pour garder toutes les classes natives
          sed -i 's/minifyEnabled true/minifyEnabled false/' build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/' build.gradle 2>/dev/null || true
          echo "✅ Minification disabled for Release build"

      - name: Allow cleartext HTTP traffic in AndroidManifest.xml
        working-directory: ./frontend/android/app/src/main
        run: |
          if ! grep -q "usesCleartextTraffic" AndroidManifest.xml; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' AndroidManifest.xml
            echo "✅ HTTP cleartext traffic allowed"
          else
            echo "✅ Already configured"
          fi
          grep "usesCleartextTraffic" AndroidManifest.xml

      - name: Fix PNG after prebuild
        working-directory: ./frontend
        run: |
          echo "Correction PNG apres prebuild..."
          find android -name "tunisiaflag*" 2>/dev/null | while read f; do
            echo "Correction post-prebuild: $f"
            convert "$f" -strip /tmp/fixed.png && cp /tmp/fixed.png "$f"
          done
          find android/app/src -name "*.png" 2>/dev/null | while read f; do
            convert "$f" -strip "$f" 2>/dev/null || true
          done

      - name: Make gradlew executable
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Build APK Release
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATB-DigiPack-APK-${{ github.run_number }}
          path: ./frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30